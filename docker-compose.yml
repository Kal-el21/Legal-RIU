services:
  postgres:
    image: postgres:16-alpine
    container_name: legal_riu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - legal_riu_network

  minio:
    image: minio/minio:latest
    container_name: legal_riu_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    networks:
      - legal_riu_network

  seed-admin:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: legal-riu-backend:latest
    container_name: legal_riu_seed_admin
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    command: ["./seed-admin"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - legal_riu_network
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: legal-riu-backend:latest
    container_name: legal_riu_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    ports:
      - "${BACKEND_HOST_PORT}:${APP_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      seed-admin:
        condition: service_completed_successfully
    networks:
      - legal_riu_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal_riu_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT}:80"
    depends_on:
      - backend
    networks:
      - legal_riu_network

  nginx:
    image: nginx:alpine
    container_name: legal_riu_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - legal_riu_network

volumes:
  postgres_data:
  minio_data:

networks:
  legal_riu_network:
    driver: bridge
