services:
  postgres:
    image: postgres:18.1
    container_name: legal_riu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legal_riu_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - legal_riu_network

  minio:
    image: minio/minio:latest
    container_name: legal_riu_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - legal_riu_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal_riu_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
    networks:
      - legal_riu_network

   frontend:
     build:
       context: ./frontend
       dockerfile: Dockerfile
     container_name: legal_riu_frontend
     restart: unless-stopped
     ports:
       - "89:80"
    depends_on:
      - backend
    networks:
      - legal_riu_network

  nginx:
    image: nginx:alpine
    container_name: legal_riu_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - legal_riu_network

volumes:
  postgres_data:
  minio_data:

networks:
  legal_riu_network:
    driver: bridge